<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Réels Nails Co · Tarjeta de Fidelización</title>
  <meta name="theme-color" content="#0e0e0e" />
  <meta property="og:title" content="Réels Nails Co · Mi tarjeta de fidelización" />
  <meta property="og:description" content="Acumula visitas y gana un manicure gratis · Studio boutique en Bogotá" />

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pink: #E91E8C;
      --pink-light: #f563b4;
      --dark: #0e0e0e;
      --dark2: #1a1a1a;
      --gray: #888;
      --white: #ffffff;
    }
    html, body { background: var(--dark); min-height: 100vh; font-family: 'DM Sans', sans-serif; color: var(--white); overflow-x: hidden; }

    @keyframes fadeUp    { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
    @keyframes popIn     { 0%{transform:scale(0.8);opacity:0} 70%{transform:scale(1.03)} 100%{transform:scale(1);opacity:1} }
    @keyframes pulse     { 0%,100%{opacity:1} 50%{opacity:.5} }
    @keyframes scanLine  { 0%{top:10%} 50%{top:85%} 100%{top:10%} }
    @keyframes glow      { 0%,100%{box-shadow:0 0 20px rgba(233,30,140,.25)} 50%{box-shadow:0 0 50px rgba(233,30,140,.6)} }
    @keyframes stamped   { 0%{transform:scale(1)} 40%{transform:scale(1.5)} 70%{transform:scale(.92)} 100%{transform:scale(1)} }
    @keyframes confetti  { to{transform:translateY(110vh) rotate(720deg);opacity:0} }
    @keyframes marquee   { from{transform:translateX(0)} to{transform:translateX(-50%)} }
    @keyframes scrollPulse { 0%,100%{opacity:.4} 50%{opacity:1} }

    /* ── BUTTONS (identical to website) ── */
    .btn-primary {
      background: var(--pink); color: white;
      padding: .9rem 2.2rem; border-radius: 3rem;
      font-size: .82rem; letter-spacing: .1em; text-transform: uppercase;
      text-decoration: none; border: 1px solid var(--pink);
      font-family: 'DM Sans', sans-serif; cursor: pointer;
      transition: all .3s; display: inline-block; text-align: center;
    }
    .btn-primary:hover { background: transparent; color: var(--pink); transform: translateY(-2px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .btn-ghost {
      background: transparent; color: rgba(255,255,255,.7);
      padding: .9rem 2.2rem; border-radius: 3rem;
      font-size: .82rem; letter-spacing: .1em; text-transform: uppercase;
      border: 1px solid rgba(255,255,255,.2); text-decoration: none;
      font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all .3s;
    }
    .btn-ghost:hover { border-color: var(--pink); color: var(--pink); }

    /* ── INPUTS ── */
    .input {
      width: 100%; background: var(--dark2); border: 1px solid rgba(255,255,255,.1);
      border-radius: 1rem; padding: 1rem 1.3rem; color: var(--white);
      font-family: 'DM Sans', sans-serif; font-size: .95rem; outline: none;
      transition: border-color .2s;
    }
    .input:focus { border-color: var(--pink); }
    .input::placeholder { color: #444; }

    /* ── SECTION LABEL (identical to website) ── */
    .section-label {
      font-size: .7rem; letter-spacing: .3em; text-transform: uppercase;
      color: var(--pink); margin-bottom: .8rem; display: block;
    }
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.2rem, 6vw, 3.5rem); font-weight: 300; line-height: 1.1;
    }
    .section-title em { font-style: italic; color: var(--pink); }

    /* ── STAT CARD (from about section) ── */
    .stat-card {
      padding: 1.5rem; border: 1px solid rgba(233,30,140,.2);
      border-radius: 1rem; transition: border-color .3s;
    }
    .stat-card:hover { border-color: rgba(233,30,140,.5); }
    .stat-num { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; font-weight: 300; color: var(--pink); line-height: 1; }
    .stat-label { font-size: .85rem; color: var(--gray); margin-top: .4rem; }

    /* ── MODAL ── */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,.75);
      backdrop-filter: blur(12px); display: flex;
      align-items: center; justify-content: center; z-index: 999;
      animation: fadeUp .2s ease;
    }
    .modal {
      background: var(--dark2); border: 1px solid rgba(233,30,140,.2);
      border-radius: 1.5rem; padding: 2.5rem; width: 92%; max-width: 380px;
      animation: popIn .25s ease;
    }

    /* ── POLICY CARD (from website policies section) ── */
    .policy-card {
      background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.08);
      border-radius: 1rem; padding: 1.5rem;
    }
    .policy-card.active { border-color: var(--pink); background: rgba(233,30,140,.05); }

    /* ── STRIP (identical to website) ── */
    .strip { background: var(--pink); padding: .75rem 0; overflow: hidden; }
    .strip-inner { display: flex; gap: 3rem; white-space: nowrap; animation: marquee 8s linear infinite; }
    .strip-item { font-family: 'Cormorant Garamond', serif; font-size: .95rem; font-style: italic; letter-spacing: .1em; color: rgba(255,255,255,.9); flex-shrink: 0; }

    /* ── FEATURE CARD (from website feature section) ── */
    .feature-card {
      background: rgba(255,255,255,.03); border: 1px solid rgba(233,30,140,.2);
      border-radius: 1.5rem; padding: 2.5rem;
    }
    .feature-badge {
      display: inline-block; background: rgba(233,30,140,.15);
      border: 1px solid rgba(233,30,140,.3); color: var(--pink);
      font-size: .7rem; letter-spacing: .15em; text-transform: uppercase;
      padding: .35rem 1rem; border-radius: 2rem; margin-bottom: 1.2rem;
    }

    /* ── CONTACT METHOD (from website contact section) ── */
    .contact-method {
      display: flex; align-items: center; gap: .8rem;
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.1);
      border-radius: 1rem; padding: 1rem 1.5rem; cursor: pointer;
      transition: all .3s; color: rgba(255,255,255,.7);
    }
    .contact-method:hover { border-color: var(--pink); color: var(--pink); }
    .contact-method-label { font-size: .65rem; text-transform: uppercase; letter-spacing: .1em; color: var(--gray); display: block; }

    /* ── NAIL SVG ── */
    .nail-wrap { transition: filter .3s; }
    .nail-wrap.filled { filter: drop-shadow(0 0 6px rgba(233,30,140,.7)); }
    .nail-wrap.animating { animation: stamped .5s ease; }

    /* ── TABS (from website services section) ── */
    .tab {
      padding: .5rem 1.3rem; border-radius: 2rem; cursor: pointer;
      font-size: .78rem; letter-spacing: .05em; border: 1px solid rgba(255,255,255,.15);
      color: rgba(255,255,255,.5); background: transparent;
      font-family: 'DM Sans', sans-serif; transition: all .25s;
    }
    .tab:hover { border-color: var(--pink); color: var(--pink); }
    .tab.active { background: var(--pink); border-color: var(--pink); color: white; }

    /* ── SCANNER BOX ── */
    .scanner-box {
      width: 100%; max-width: 300px; aspect-ratio: 1;
      border-radius: 1.5rem; overflow: hidden; position: relative;
      border: 1px solid rgba(233,30,140,.3); background: #0a0a0a;
    }
    .scan-corner {
      position: absolute; width: 22px; height: 22px;
    }
    .scan-corner.tl { top:14px; left:14px; border-top:2px solid var(--pink); border-left:2px solid var(--pink); }
    .scan-corner.tr { top:14px; right:14px; border-top:2px solid var(--pink); border-right:2px solid var(--pink); }
    .scan-corner.bl { bottom:14px; left:14px; border-bottom:2px solid var(--pink); border-left:2px solid var(--pink); }
    .scan-corner.br { bottom:14px; right:14px; border-bottom:2px solid var(--pink); border-right:2px solid var(--pink); }
    .scan-line {
      position: absolute; left: 20px; right: 20px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--pink), transparent);
      box-shadow: 0 0 8px var(--pink);
      animation: scanLine 2.5s ease-in-out infinite;
    }

    /* ── FOOTER ── */
    footer {
      background: #080808; padding: 1.5rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid rgba(255,255,255,.06); flex-wrap: wrap; gap: 1rem;
    }
    .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; color: var(--white); }
    .footer-logo span { color: var(--pink); }
    .footer-copy { font-size: .72rem; color: var(--gray); }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 2rem; background: rgba(14,14,14,.92);
      backdrop-filter: blur(12px); border-bottom: 1px solid rgba(233,30,140,.15);
    }
    .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; letter-spacing: .12em; color: var(--white); text-decoration: none; }
    .nav-logo span { color: var(--pink); }
    .nav-back { font-size: .75rem; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.5); cursor: pointer; transition: color .3s; background: none; border: none; }
    .nav-back:hover { color: var(--pink); }

    /* ── PAGE ── */
    .page { min-height: 100vh; padding-top: 5rem; }
    .container { max-width: 700px; margin: 0 auto; padding: 0 1.5rem; }

    /* ── PROGRESS BAR ── */
    .progress-track { height: 2px; background: rgba(255,255,255,.07); border-radius: 99px; }
    .progress-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, var(--pink), var(--pink-light));
      box-shadow: 0 0 10px rgba(233,30,140,.5);
      transition: width .8s cubic-bezier(.34,1.56,.64,1);
    }

    @media (max-width: 480px) {
      nav { padding: 1rem 1.2rem; }
      .modal { padding: 1.8rem; }
    }

    /* ── FLOATING STICKERS (identical to website) ── */
    .floating-sticker {
      position: fixed; pointer-events: none; z-index: 10;
      will-change: transform;
      filter: drop-shadow(0 8px 24px rgba(233,30,140,0.18));
    }
    .sticker-1 {
      width: clamp(110px, 13vw, 170px);
      bottom: 6%; left: 1.5%; opacity: 0;
      animation: stickerIn 0.8s 0.5s ease forwards, float1 6s 1.3s ease-in-out infinite;
    }
    .sticker-2 {
      width: clamp(100px, 12vw, 155px);
      top: 38%; right: 0.8%; opacity: 0;
      animation: stickerIn 0.8s 0.9s ease forwards, float2 7.5s 1.7s ease-in-out infinite;
    }
    .sticker-3 {
      width: clamp(95px, 11vw, 140px);
      top: 18%; left: 1%; opacity: 0;
      animation: stickerIn 0.8s 1.3s ease forwards, float3 8.5s 2.1s ease-in-out infinite;
    }
    @keyframes stickerIn {
      from { opacity: 0; transform: scale(0.75) translateY(20px); }
      to   { opacity: 1; }
    }
    @keyframes float1 {
      0%   { transform: translateY(0px)   translateX(0px)   rotate(-4deg); }
      30%  { transform: translateY(-18px) translateX(6px)   rotate(-2deg); }
      60%  { transform: translateY(-8px)  translateX(-4px)  rotate(-5deg); }
      100% { transform: translateY(0px)   translateX(0px)   rotate(-4deg); }
    }
    @keyframes float2 {
      0%   { transform: translateY(0px)   translateX(0px)   rotate(5deg); }
      40%  { transform: translateY(-22px) translateX(-8px)  rotate(3deg); }
      70%  { transform: translateY(-10px) translateX(5px)   rotate(7deg); }
      100% { transform: translateY(0px)   translateX(0px)   rotate(5deg); }
    }
    @keyframes float3 {
      0%   { transform: translateY(0px)   translateX(0px)   rotate(3deg); }
      25%  { transform: translateY(-14px) translateX(-6px)  rotate(1deg); }
      55%  { transform: translateY(-20px) translateX(7px)   rotate(5deg); }
      80%  { transform: translateY(-6px)  translateX(-3px)  rotate(2deg); }
      100% { transform: translateY(0px)   translateX(0px)   rotate(3deg); }
    }
    @media (max-width: 480px) {
      .sticker-1 { width: 90px; bottom: 3%; left: 0; }
      .sticker-2 { width: 90px; top: 40%; right: 0; }
      .sticker-3 { width: 85px; top: 22%; left: 0; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<!-- Floating stickers — mismas imágenes que el sitio principal -->
<img class="floating-sticker sticker-1" src="sticker1.png" alt="" aria-hidden="true">
<img class="floating-sticker sticker-2" src="sticker2.png" alt="" aria-hidden="true">
<img class="floating-sticker sticker-3" src="sticker3.png" alt="" aria-hidden="true">

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ═══════════════════════════════
//  CONFIGURACIÓN
// ═══════════════════════════════
const ADMIN_CODE  = "reels2025";   // ← cambia tu código aquí
const STAMPS_GOAL = 6;
const PRIZE_LABEL = "Manicure gratis";
const STORAGE_KEY = "rnc_branded_v1";

// ═══════════════════════════════
//  STORAGE
// ═══════════════════════════════
function loadClients() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); }
  catch { return []; }
}
function saveClients(list) { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); }
function genId() { return Date.now().toString(36).toUpperCase() + Math.random().toString(36).slice(2,5).toUpperCase(); }
function baseUrl() { return window.location.href.replace(/[#?].*$/, ""); }
function cardUrl(id) { return baseUrl() + "?card=" + id; }
function registerUrl() { return baseUrl() + "?register=1"; }

// ═══════════════════════════════
//  QR IMAGE
// ═══════════════════════════════
function QRImage({ value, size = 180 }) {
  const src = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(value)}&color=E91E8C&bgcolor=1a1a1a&margin=8&ecc=M`;
  return <img src={src} width={size} height={size} alt="QR" style={{ borderRadius:12, display:"block" }} />;
}

// ═══════════════════════════════
//  NAIL SVG (esmalte de uña)
// ═══════════════════════════════
function Nail({ filled, animating }) {
  const pink = "#E91E8C";
  return (
    <div className={`nail-wrap${filled?" filled":""}${animating?" animating":""}`}>
      <svg viewBox="0 0 22 44" width={20} height={40}>
        <rect x="7" y="0" width="8" height="8" rx="2" fill={filled ? pink : "#252525"} />
        <rect x="8.5" y="7" width="5" height="4" rx="1" fill={filled ? "#c4006e" : "#1e1e1e"} />
        <path d="M5 10 Q11 7.5 17 10 L17 15 Q11 12.5 5 15Z" fill={filled ? pink : "#222"} />
        <rect x="4.5" y="14" width="13" height="26" rx="5" fill={filled ? pink : "#1e1e1e"} />
        {filled && <rect x="8" y="19" width="4" height="11" rx="2" fill="#f563b4" opacity=".3" />}
        <ellipse cx="11" cy="40" rx="5.5" ry="2.5" fill={filled ? "#9e0058" : "#181818"} />
      </svg>
    </div>
  );
}

// ═══════════════════════════════
//  CONFETTI
// ═══════════════════════════════
function Confetti() {
  const items = Array.from({ length: 40 }, (_, i) => ({
    id: i,
    color: ["#E91E8C","#f563b4","#FFD700","#fff","#c4006e","#fce4f3"][i % 6],
    left: Math.random() * 100,
    delay: Math.random() * .9,
    dur: 1.3 + Math.random() * .9,
    size: 6 + Math.random() * 8,
  }));
  return <>{items.map(d => (
    <div key={d.id} style={{
      position:"fixed", top:"-10px", left:d.left+"vw",
      width:d.size, height:d.size, background:d.color, borderRadius:"2px",
      animation:`confetti ${d.dur}s ${d.delay}s ease-in forwards`,
      pointerEvents:"none", zIndex:9999,
    }} />
  ))}</>;
}

// ═══════════════════════════════
//  STRIP
// ═══════════════════════════════
function Strip() {
  const items = ["Tarjeta de fidelización","✦","Réels Nails Co.","✦","Bogotá · Studio Boutique","✦","Johanna Reales","✦","6 visitas · 1 regalo","✦"];
  const doubled = [...items, ...items];
  return (
    <div className="strip">
      <div className="strip-inner">
        {doubled.map((t,i) => <span key={i} className="strip-item">{t}</span>)}
      </div>
    </div>
  );
}

// ═══════════════════════════════
//  NAV
// ═══════════════════════════════
function Nav({ onBack, backLabel }) {
  return (
    <nav>
      <a className="nav-logo" href={baseUrl()}>RÉ<span>ELS</span></a>
      {onBack && <button className="nav-back" onClick={onBack}>← {backLabel || "Volver"}</button>}
    </nav>
  );
}

// ═══════════════════════════════
//  REGISTER VIEW
// ═══════════════════════════════
function RegisterView({ onDone }) {
  const [name, setName] = useState("");
  const [err, setErr]   = useState("");

  const create = () => {
    if (!name.trim()) { setErr("Escribe tu nombre"); return; }
    const clients = loadClients();
    const nc = { id: genId(), name: name.trim(), stamps: 0, createdAt: Date.now() };
    saveClients([...clients, nc]);
    onDone(nc);
  };

  return (
    <>
      <Nav />
      <Strip />
      <div className="page">
        <div className="container" style={{ paddingTop:"3rem", paddingBottom:"4rem" }}>

          {/* Hero text — identical style to website hero */}
          <div style={{ textAlign:"center", marginBottom:"3rem", animation:"fadeUp .7s ease" }}>
            <div style={{ width:80, height:80, borderRadius:"50%", overflow:"hidden", border:"1px solid rgba(233,30,140,.4)", margin:"0 auto 1.5rem", boxShadow:"0 0 40px rgba(233,30,140,.25)" }}>
              <img src="logo.png" alt="Réels" style={{ width:"100%", height:"100%", objectFit:"cover" }} onError={e => { e.target.style.display="none"; e.target.parentNode.innerHTML='<div style="width:100%;height:100%;background:rgba(233,30,140,.15);display:flex;align-items:center;justify-content:center;font-family:Cormorant Garamond,serif;font-size:1.1rem;color:#E91E8C">RN</div>'; }} />
            </div>
            <span className="section-label">Réels Nails Co. · Bogotá</span>
            <h1 className="section-title">Tu tarjeta de<br /><em>fidelización</em></h1>
            <p style={{ fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic", color:"rgba(255,255,255,.45)", fontSize:"1.1rem", marginTop:".8rem" }}>
              Acumula {STAMPS_GOAL} visitas y gana un {PRIZE_LABEL.toLowerCase()} ✦
            </p>
          </div>

          {/* Stats — identical to website about section */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"1rem", marginBottom:"2.5rem", animation:"fadeUp .7s .2s ease both" }}>
            <div className="stat-card">
              <div className="stat-num">{STAMPS_GOAL}</div>
              <div className="stat-label">visitas para tu regalo</div>
            </div>
            <div className="stat-card">
              <div className="stat-num">1:1</div>
              <div className="stat-label">Atención exclusiva</div>
            </div>
          </div>

          {/* Form */}
          <div style={{ animation:"fadeUp .7s .35s ease both" }}>
            <div style={{ marginBottom:".6rem", fontSize:".7rem", letterSpacing:".2em", textTransform:"uppercase", color:"rgba(255,255,255,.4)" }}>Tu nombre</div>
            <input className="input" placeholder="Nombre completo"
              value={name} onChange={e => { setName(e.target.value); setErr(""); }}
              onKeyDown={e => e.key === "Enter" && create()} autoFocus />
            {err && <div style={{ fontSize:".82rem", color:"#f563b4", marginTop:".5rem" }}>{err}</div>}
            <button className="btn-primary" style={{ width:"100%", marginTop:"1rem" }} onClick={create}>
              Crear mi tarjeta
            </button>
            <p style={{ fontSize:".72rem", color:"#333", textAlign:"center", marginTop:"1rem", letterSpacing:".05em" }}>
              Guarda el link que recibirás para volver a tu tarjeta siempre
            </p>
          </div>
        </div>
      </div>
      <footer>
        <div className="footer-logo">RÉ<span>ELS</span> Nails Co.</div>
        <div className="footer-copy">by Johanna Reales · Bogotá</div>
      </footer>
    </>
  );
}

// ═══════════════════════════════
//  CLIENT CARD VIEW
// ═══════════════════════════════
function ClientCardView({ clientId }) {
  const [client, setClient]             = useState(null);
  const [showQR, setShowQR]             = useState(false);
  const [showConfetti, setShowConfetti] = useState(false);
  const [animStamp, setAnimStamp]       = useState(null);
  const prevStamps = useRef(null);

  const fetch = useCallback(() => {
    const all = loadClients();
    const c = all.find(x => x.id === clientId);
    if (c) {
      if (prevStamps.current !== null && c.stamps > prevStamps.current) {
        setAnimStamp(c.stamps - 1);
        setTimeout(() => setAnimStamp(null), 700);
        if (c.stamps >= STAMPS_GOAL) {
          setShowConfetti(true);
          setTimeout(() => setShowConfetti(false), 4000);
        }
      }
      prevStamps.current = c.stamps;
      setClient({ ...c });
    }
  }, [clientId]);

  useEffect(() => {
    fetch();
    const t = setInterval(fetch, 3000);
    return () => clearInterval(t);
  }, [fetch]);

  if (!client) return (
    <>
      <Nav />

// ═══════════════════════════════
//  QR SCANNER
// ═══════════════════════════════
function QRScanner({ onStamped }) {
  const videoRef  = useRef(null);
  const canvasRef = useRef(null);
  const streamRef = useRef(null);
  const rafRef    = useRef(null);
  const [status, setStatus]         = useState("idle");
  const [lastClient, setLastClient] = useState(null);

  const stopCamera = () => {
    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    if (streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); streamRef.current = null; }
  };

  const scan = useCallback(() => {
    const v = videoRef.current, c = canvasRef.current;
    if (!v || !c || !window.jsQR) { rafRef.current = requestAnimationFrame(scan); return; }
    const ctx = c.getContext("2d");
    if (v.readyState === v.HAVE_ENOUGH_DATA) {
      c.width = v.videoWidth; c.height = v.videoHeight;
      ctx.drawImage(v, 0, 0, c.width, c.height);
      const img  = ctx.getImageData(0, 0, c.width, c.height);
      const code = window.jsQR(img.data, img.width, img.height, { inversionAttempts:"attemptBoth" });
      if (code?.data) {
        const m = code.data.match(/[?&]card=([A-Z0-9]+)/i);
        if (m) { doStamp(m[1].toUpperCase()); return; }
      }
    }
    rafRef.current = requestAnimationFrame(scan);
  }, []);

  const startCamera = async () => {
    setStatus("scanning");
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:{ideal:"environment"}, width:{ideal:1280} } });
      streamRef.current = stream;
      if (videoRef.current) { videoRef.current.srcObject = stream; await videoRef.current.play(); rafRef.current = requestAnimationFrame(scan); }
    } catch { setStatus("error"); }
  };

  const doStamp = (id) => {
    stopCamera();
    const all = loadClients();
    const c = all.find(x => x.id === id);
    if (!c) { setStatus("notfound"); return; }
    const updated = all.map(x => x.id === id ? { ...x, stamps: Math.min(x.stamps+1, STAMPS_GOAL) } : x);
    saveClients(updated);
    setLastClient(updated.find(x => x.id === id));
    setStatus("stamped");
    onStamped && onStamped();
  };

  const reset = () => { setLastClient(null); startCamera(); };
  useEffect(() => () => stopCamera(), []);

  if (status === "idle") return (
    <div style={{ textAlign:"center", padding:"2rem 0" }}>
      <div style={{ fontSize:"3rem", marginBottom:"1rem" }}>📷</div>
      <p style={{ color:"rgba(255,255,255,.4)", fontSize:".9rem", marginBottom:"1.5rem", lineHeight:1.6 }}>
        Activa la cámara para escanear el QR de la clienta cuando llegue a su cita.
      </p>
      <button className="btn-primary" onClick={startCamera}>Abrir cámara</button>
    </div>
  );

  if (status === "scanning") return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:"1rem" }}>
      <div className="scanner-box">
        <video ref={videoRef} playsInline muted style={{ width:"100%", height:"100%", objectFit:"cover", display:"block" }} />
        <canvas ref={canvasRef} style={{ display:"none" }} />
        <div className="scan-corner tl" /><div className="scan-corner tr" />
        <div className="scan-corner bl" /><div className="scan-corner br" />
        <div className="scan-line" />
        <div style={{ position:"absolute", bottom:0, left:0, right:0, background:"linear-gradient(transparent,rgba(0,0,0,.5))", padding:"1rem", textAlign:"center", fontSize:".72rem", color:"rgba(255,255,255,.5)" }}>
          Apunta al QR de la clienta
        </div>
        <button className="btn-ghost" onClick={() => { stopCamera(); setStatus("idle"); }}
          style={{ position:"absolute", top:10, right:10, padding:".4rem .9rem", fontSize:".72rem" }}>✕</button>
      </div>
    </div>
  );

  if (status === "error") return (
    <div style={{ textAlign:"center", padding:"2rem 0" }}>
      <div style={{ fontSize:"2.5rem", marginBottom:".8rem" }}>⚠️</div>
      <p style={{ color:"rgba(255,255,255,.45)", marginBottom:"1.5rem", lineHeight:1.6 }}>
        No se pudo acceder a la cámara.<br /><span style={{ color:"rgba(255,255,255,.3)", fontSize:".82rem" }}>Permite el acceso en el navegador.</span>
      </p>
      <button className="btn-ghost" onClick={startCamera}>Reintentar</button>
    </div>
  );

  if (status === "notfound") return (
    <div style={{ textAlign:"center", padding:"2rem 0" }}>
      <div style={{ fontSize:"2.5rem", marginBottom:".8rem" }}>🔍</div>
      <p style={{ color:"rgba(255,255,255,.45)", marginBottom:"1.5rem" }}>QR no reconocido.<br /><span style={{ fontSize:".82rem", color:"rgba(255,255,255,.3)" }}>No pertenece a ninguna clienta registrada.</span></p>
      <button className="btn-primary" onClick={reset}>Escanear de nuevo</button>
    </div>
  );

  if (status === "stamped" && lastClient) {
    const full = lastClient.stamps >= STAMPS_GOAL;
    return (
      <div style={{ animation:"popIn .35s ease" }}>
        <div className="feature-card" style={{ borderColor: full ? "rgba(233,30,140,.5)" : "rgba(233,30,140,.2)", textAlign:"center" }}>
          <div style={{ fontSize:"2.5rem", marginBottom:".8rem" }}>{full ? "🏆" : "✦"}</div>
          <span className="section-label">{full ? "Premio desbloqueado" : "Sello añadido"}</span>
          <h2 className="section-title" style={{ fontSize:"1.8rem", marginBottom:".8rem" }}>{lastClient.name}</h2>
          <div style={{ display:"flex", justifyContent:"center", gap:"8px", margin:"1.2rem 0", flexWrap:"wrap" }}>
            {Array.from({ length: STAMPS_GOAL }, (_, i) => (
              <Nail key={i} filled={i < lastClient.stamps} animating={i === lastClient.stamps - 1} />
            ))}
          </div>
          <div className="progress-track" style={{ marginBottom:".8rem" }}>
            <div className="progress-fill" style={{ width:(Math.min(lastClient.stamps/STAMPS_GOAL,1)*100)+"%" }} />
          </div>
          <p style={{ fontSize:".82rem", color:"rgba(255,255,255,.4)", marginBottom: full ? ".5rem" : "1.5rem" }}>
            {lastClient.stamps}/{STAMPS_GOAL} visitas
          </p>
          {full && <p style={{ color:"var(--pink)", fontFamily:"'Cormorant Garamond',serif", fontSize:"1.2rem", fontStyle:"italic", marginBottom:"1.5rem" }}>¡Le corresponde el {PRIZE_LABEL.toLowerCase()}!</p>}
          <button className="btn-primary" style={{ width:"100%" }} onClick={reset}>Escanear siguiente clienta</button>
        </div>
      </div>
    );
  }

  return null;
}

        <div style={{ width:"100%", maxWidth:360, animation:"fadeUp .6s ease" }}>
          <div style={{ textAlign:"center", marginBottom:"2.5rem" }}>
            <div style={{ width:70, height:70, borderRadius:"50%", overflow:"hidden", border:"1px solid rgba(233,30,140,.3)", margin:"0 auto 1.2rem", boxShadow:"0 0 30px rgba(233,30,140,.2)" }}>
              <img src="logo.png" alt="Réels" style={{ width:"100%", height:"100%", objectFit:"cover" }} onError={e => { e.target.style.display="none"; e.target.parentNode.innerHTML='<div style="width:100%;height:100%;background:rgba(233,30,140,.12);display:flex;align-items:center;justify-content:center;font-family:Cormorant Garamond,serif;font-size:1rem;color:#E91E8C">RN</div>'; }} />
            </div>
            <span className="section-label">Réels Nails Co.</span>
            <h1 className="section-title" style={{ fontSize:"2rem" }}>Panel de <em>admin</em></h1>
          </div>
          <input className="input" type="password" placeholder="Código de acceso"
            value={code} onChange={e => { setCode(e.target.value); setErr(""); }}
            onKeyDown={e => e.key === "Enter" && check()} autoFocus />
          {err && <div style={{ fontSize:".82rem", color:"#f563b4", marginTop:".5rem" }}>{err}</div>}
          <button className="btn-primary" style={{ width:"100%", marginTop:"1rem" }} onClick={check}>Entrar</button>
        </div>
      </div>
    </>
  );
}

// ═══════════════════════════════
//  ROOT
// ═══════════════════════════════
function App() {
  const [view, setView]         = useState("boot");
  const [clientId, setClientId] = useState(null);
  const [authed, setAuthed]     = useState(false);

  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    if (params.get("register")) setView("register");
    else if (params.get("card")) { setClientId(params.get("card").toUpperCase()); setView("card"); }
    else setView("adminAuth");
  }, []);

  const goCard = (c) => {
    window.history.replaceState(null, "", cardUrl(c.id));
    setClientId(c.id); setView("card");
  };

  if (view === "boot") return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic", color:"var(--pink)", animation:"pulse 1.5s infinite" }}>Cargando...</div>
    </div>
  );

  return (
    <>
      {view === "register"  && <RegisterView onDone={goCard} />}
      {view === "card"      && <ClientCardView clientId={clientId} />}
      {view === "adminAuth" && <AdminAuth onAuth={() => { setAuthed(true); setView("admin"); }} />}
      {view === "admin" && authed && <AdminPanel />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<!-- Glitter cursor — idéntico al sitio principal -->
<script>
document.addEventListener('mousemove', function(e) {
  for (let i = 0; i < 3; i++) setTimeout(() => createSparkle(e.clientX, e.clientY), i * 60);
});
document.addEventListener('click', function(e) {
  for (let i = 0; i < 8; i++) setTimeout(() => createSparkle(e.clientX, e.clientY), i * 40);
});
document.addEventListener('touchstart', function(e) {
  const t = e.touches[0];
  for (let i = 0; i < 8; i++) setTimeout(() => createSparkle(t.clientX, t.clientY), i * 40);
});
document.addEventListener('touchmove', function(e) {
  const t = e.touches[0];
  for (let i = 0; i < 3; i++) setTimeout(() => createSparkle(t.clientX, t.clientY), i * 60);
});

function createSparkle(x, y) {
  const sparkle  = document.createElement('div');
  const size     = Math.random() * 6 + 3;
  const angle    = Math.random() * 360;
  const distance = Math.random() * 50 + 20;
  const duration = Math.random() * 1200 + 900;

  sparkle.style.cssText = `
    position:fixed; left:${x}px; top:${y}px;
    width:${size}px; height:${size}px;
    pointer-events:none; z-index:9999; border-radius:50%;
    background:white;
    box-shadow:0 0 ${size*2}px rgba(255,255,255,.9), 0 0 ${size*4}px rgba(255,220,255,.4);
    transform:translate(-50%,-50%);
  `;
  document.body.appendChild(sparkle);

  const rad = (angle * Math.PI) / 180;
  sparkle.animate([
    { transform:'translate(-50%,-50%) scale(1)', opacity:1 },
    { transform:`translate(calc(-50% + ${Math.cos(rad)*distance}px), calc(-50% + ${Math.sin(rad)*distance}px)) scale(0)`, opacity:0 }
  ], { duration, easing:'ease-out', fill:'forwards' });

  setTimeout(() => sparkle.remove(), duration);
}
</script>
